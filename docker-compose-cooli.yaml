version: '3.8'

services:
  open-health:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-health
    restart: always
    # Esto es vital para que no explote durante el build o ejecución
    deploy:
      resources:
        limits:
          memory: 2G 
    environment:
      - NEXTAUTH_URL=${SERVICE_FQDN_APP:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: open-health-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-openhealth}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - POSTGRES_DB=${POSTGRES_DB:-openhealthdb}
    volumes:
      - open-health-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  open-health-db-data:
